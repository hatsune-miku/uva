name: Release

# CI creates the tag and the GitHub Release automatically.
#
# How it works: on every push to `main`, the `check` job reads the version from
# Cargo.toml. If no `v<version>` tag exists yet, the `build` job compiles the
# binaries on each native runner and publishes a Release at tag `v<version>`
# (the tag is created as part of publishing). Bumping the version in Cargo.toml
# and pushing to main is therefore all it takes to cut a new release; pushing
# again without a bump is a no-op.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "覆盖版本号（留空则取 Cargo.toml 中的版本）"
        required: false

permissions:
  contents: write # required to create the tag, the Release, and upload assets

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Decide version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.decide.outputs.version }}
      release: ${{ steps.decide.outputs.release }}
    steps:
      - uses: actions/checkout@v4

      - id: decide
        shell: bash
        run: |
          input="${{ github.event.inputs.version }}"
          if [ -n "$input" ]; then
            version="${input#v}"   # tolerate a leading "v"
          else
            version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$version" | grep -q .; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag v$version already exists — nothing to release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Will release v$version."
          fi

  build:
    name: ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Windows, zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "uva-${{ matrix.target }}.zip"
          $bin = "target/${{ matrix.target }}/release/uva${{ matrix.ext }}"
          Compress-Archive -Path $bin -DestinationPath $asset -Force
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File "$asset.sha256" -Encoding ascii -NoNewline
          "ASSET=$asset" | Out-File $env:GITHUB_ENV -Append -Encoding ascii

      - name: Package (Unix, tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          asset="uva-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" "uva${{ matrix.ext }}"
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
