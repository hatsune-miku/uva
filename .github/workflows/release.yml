name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release and upload assets

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Windows, zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "uva-${{ matrix.target }}.zip"
          $bin = "target/${{ matrix.target }}/release/uva${{ matrix.ext }}"
          Compress-Archive -Path $bin -DestinationPath $asset -Force
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File "$asset.sha256" -Encoding ascii -NoNewline
          "ASSET=$asset" | Out-File $env:GITHUB_ENV -Append -Encoding ascii

      - name: Package (Unix, tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          asset="uva-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" "uva${{ matrix.ext }}"
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
