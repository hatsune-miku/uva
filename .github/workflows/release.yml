name: Release

# CI builds the binaries and publishes the GitHub Release automatically.
#
# Trigger: every push to `main` (or manual dispatch). The version comes from
# Cargo.toml (or the dispatch input). Behavior:
#   - new version  → a fresh `v<version>` Release is created.
#   - same version → the existing `v<version>` Release and tag are DELETED and
#     recreated from the current commit, so its binaries are overwritten.
# Builds run first; the Release is only touched after every target succeeds, so
# a failing build never destroys an existing Release. Asset names carry no
# version, so `install.ps1`/`install.sh` can always pull `latest/download/...`.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "覆盖版本号（留空则取 Cargo.toml 中的版本）"
        required: false

permissions:
  contents: write # required to create/delete the tag and Release, upload assets

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            archive: zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
            linker: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up cross linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Windows, zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $asset = "uva-${{ matrix.target }}.zip"
          $bin = "target/${{ matrix.target }}/release/uva${{ matrix.ext }}"
          Compress-Archive -Path $bin -DestinationPath $asset -Force
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File "$asset.sha256" -Encoding ascii -NoNewline

      - name: Package (Unix, tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          asset="uva-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" "uva${{ matrix.ext }}"
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            uva-*.zip
            uva-*.tar.gz
            uva-*.sha256
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        shell: bash
        run: |
          input="${{ github.event.inputs.version }}"
          if [ -n "$input" ]; then
            version="${input#v}" # tolerate a leading "v"
          else
            version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Collect built assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Overwrite existing release (same version → delete + recreate)
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::notice::v$VERSION already exists — deleting to overwrite."
            gh release delete "v$VERSION" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          else
            echo "::notice::v$VERSION is new."
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.v.outputs.version }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
